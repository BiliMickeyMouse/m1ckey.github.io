<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系 - M1ckey</title>
    <style>
        @font-face {
            font-family: 'MinecraftAE';
            src: url('Font/MinecraftAE.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'MinecraftBold';
            src: url('Font/MinecraftBold.otf') format('opentype');
            font-weight: bold;
            font-style: normal;
        }

        /* 主内容区 */
        main {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 5% 120px;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #fff, #7CABFF, #5a9aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(124, 171, 255, 0.5)); }
            50% { filter: drop-shadow(0 0 40px rgba(124, 171, 255, 0.8)); }
        }

        .subtitle {
            font-size: 1.2rem;
            color: #b8b8d1;
            margin-bottom: 3rem;
        }

        /* 联系卡片 */
        .contact-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 900px;
            margin-bottom: 3rem;
        }

        .contact-card {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .contact-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .contact-card h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #7CABFF;
        }

        .contact-card p {
            color: #b8b8d1;
            font-size: 0.95rem;
            line-height: 1.6;
            word-break: break-all;
        }

        /* BiliBili 卡片特殊样式 */
        .contact-card.bilibili h3 {
            color: #FF6699;
        }

        .contact-card.bilibili:hover {
            border-color: #FF6699 !important;
            box-shadow: 0 20px 40px rgba(255, 102, 153, 0.3) !important;
        }

        /* GitHub 卡片特殊样式 */
        .contact-card.github h3 {
            color: #ffffff;
        }

        .contact-card.github:hover {
            border-color: #ffffff !important;
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.3) !important;
        }

        /* Discord 卡片特殊样式 */
        .contact-card.discord h3 {
            color: #5865F2;
        }

        .contact-card.discord:hover {
            border-color: #5865F2 !important;
            box-shadow: 0 20px 40px rgba(88, 101, 242, 0.3) !important;
        }

        /* QQ 卡片特殊样式 */
        .contact-card.qq h3,
        .contact-card.qq p {
            color: #12B7F5;
        }

        .contact-card.qq:hover {
            border-color: #12B7F5 !important;
            box-shadow: 0 20px 40px rgba(18, 183, 245, 0.3) !important;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .page-title {
                font-size: 2rem;
            }
        }
    </style>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/logo.css">
    <link rel="stylesheet" href="css/background.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/tooltip.css">
</head>
<body>
    <video id="videoBg" class="video-bg" autoplay muted loop playsinline></video>
    <div class="video-overlay"></div>
    <script src="js/navbar.js"></script>

    <main>
        <h1>联系我</h1>
        <p class="subtitle">有任何问题或想法？欢迎随时与我联系！</p>

        <div class="contact-cards">
            <a href="https://space.bilibili.com/3690998569895956" class="contact-card bilibili">
                <div class="contact-icon"><img src="Icon/ContactMeBilibili.png" alt="BiliBili" style="width: 48px; height: 48px; object-fit: contain;"></div>
                <h3>BiliBili</h3>
                <p>米奇M1ckey_</p>
            </a>
            <a href="#" class="contact-card qq">
                <div class="contact-icon"><img src="Icon/ContactMeQQ.png" alt="QQ" style="width: 48px; height: 48px; object-fit: contain;"></div>
                <h3>QQ</h3>
                <p>2684833466</p>
            </a>
            <a href="#" class="contact-card discord">
                <div class="contact-icon"><img src="Icon/ContactMeDiscord.png" alt="Discord" style="width: 48px; height: 48px; object-fit: contain;"></div>
                <h3>Discord</h3>
                <p>M1ckey_1337</p>
            </a>
            <a href="https://github.com/BiliMickeyMouse" class="contact-card github">
                <div class="contact-icon"><img src="Icon/ContactMeGithub.png" alt="GitHub" style="width: 48px; height: 48px; object-fit: contain;"></div>
                <h3>GitHub</h3>
                <p>github.com/BiliMickeyMouse</p>
            </a>
        </div>


    </main>

    <script src="js/footer.js"></script>
    <script src="js/theme.js"></script>
    <script>
        const tooltip = document.getElementById('tooltip');
        let mouseX = 0;
        let mouseY = 0;

        function updatePosition() {
            let left = mouseX + 15;
            let top = mouseY - tooltip.offsetHeight - 10;

            // 右边界检测
            if (left + tooltip.offsetWidth > window.innerWidth) {
                left = mouseX - tooltip.offsetWidth - 15;
            }

            // 左边界检测
            if (left < 0) {
                left = 10;
            }

            // 上边界检测
            if (top < 0) {
                top = mouseY + 20;
            }

            // 下边界检测
            if (top + tooltip.offsetHeight > window.innerHeight) {
                top = window.innerHeight - tooltip.offsetHeight - 10;
            }

            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
        }

        document.querySelectorAll('[data-tooltip]').forEach(element => {
            element.addEventListener('mouseenter', (e) => {
                tooltip.textContent = e.target.dataset.tooltip;
                tooltip.classList.add('visible');
                updatePosition();
            });

            element.addEventListener('mouseleave', () => {
                tooltip.classList.remove('visible');
            });

            element.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                updatePosition();
            });
        });
    </script>
</body>
</html>
