<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系 - M1ckey</title>
    <style>
        /* 主内容区 */
        main {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 5% 120px;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #30ddff, #001aff, #001aff, #30ddff);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgb(0, 149, 255));
            animation: titleGradient 3s linear infinite;
        }

        @keyframes titleGradient {
            0% { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }

        .subtitle {
            font-size: 1.2rem;
            color: #b8b8d1;
            margin-bottom: 3rem;
        }

        /* 联系卡片容器 */
        .contact-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 900px;
            margin-bottom: 3rem;
        }

        .contact-icon img {
            width: 72px;
            height: 72px;
            object-fit: contain;
        }
    </style>
    <link rel="stylesheet" href="css/font.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/logo.css">
    <link rel="stylesheet" href="css/background.css">
    <link rel="stylesheet" href="css/card.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/tooltip.css">
</head>
<body>
    <video id="videoBg" class="video-bg" autoplay muted loop playsinline></video>
    <div class="video-overlay"></div>
    <script src="js/navbar.js"></script>

    <main>
        <h1>联系我</h1>
        <p class="subtitle">有任何问题或想法？欢迎随时与我联系！</p>

        <div class="contact-cards">
            <a href="https://space.bilibili.com/3690998569895956" class="contact-card bilibili" data-tooltip="访问我的B站主页">
                <div class="contact-icon"><img src="Icon/ContactMeBilibili.webp" alt="BiliBili"></div>
                <h3>BiliBili</h3>
                <p>米奇M1ckey_</p>
            </a>
            <a href="#" class="contact-card qq" data-tooltip="添加我的QQ">
                <div class="contact-icon"><img src="Icon/ContactMeQQ.webp" alt="QQ"></div>
                <h3>QQ</h3>
                <p>2684833466</p>
            </a>
            <a href="#" class="contact-card discord" data-tooltip="添加我的Discord">
                <div class="contact-icon"><img src="Icon/ContactMeDiscord.webp" alt="Discord"></div>
                <h3>Discord</h3>
                <p>M1ckey_1337</p>
            </a>
            <a href="https://github.com/BiliMickeyMouse" class="contact-card github" data-tooltip="访问我的GitHub主页">
                <div class="contact-icon"><img src="Icon/ContactMeGithub.webp" alt="GitHub"></div>
                <h3>GitHub</h3>
                <p>github.com/BiliMickeyMouse</p>
            </a>
        </div>
    </main>

    <script src="js/footer.js"></script>
    <script src="js/theme.js"></script>
    <script>
        const tooltip = document.getElementById('tooltip');
        let mouseX = 0;
        let mouseY = 0;

        function updatePosition() {
            let left = mouseX + 15;
            let top = mouseY - tooltip.offsetHeight - 10;

            if (left + tooltip.offsetWidth > window.innerWidth) {
                left = mouseX - tooltip.offsetWidth - 15;
            }
            if (left < 0) {
                left = 10;
            }
            if (top < 0) {
                top = mouseY + 20;
            }
            if (top + tooltip.offsetHeight > window.innerHeight) {
                top = window.innerHeight - tooltip.offsetHeight - 10;
            }

            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
        }

        document.querySelectorAll('[data-tooltip]').forEach(element => {
            element.addEventListener('mouseenter', (e) => {
                tooltip.textContent = e.target.dataset.tooltip;
                tooltip.classList.add('visible');
                updatePosition();
            });

            element.addEventListener('mouseleave', () => {
                tooltip.classList.remove('visible');
            });

            element.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                updatePosition();
            });
        });
    </script>
</body>
</html>
